</head>
<body>

    </div>
    <div class="container">
        <div id="nes" class="game">
            <h1>Please select the game.</h1>
        </div>
        <script src="scripts/jsnes.js"></script>

        <div class="containercontainer">
            <div class="controls">
                <table><thead><tr><th>Button</th><th>Player 1</th><th>Player 2</th></tr></thead><tbody><tr><td>Movement</td><td>Arrow keys</td><td>Numpad 8 / 2 / 4 / 6</td></tr><tr><td>A</td><td>X</td><td>Numpad 7</td></tr><tr><td>B</td><td>Z (or Y)</td><td>Numpad 9</td></tr><tr><td>Turbo A</td><td>S</td><td>—</td></tr><tr><td>Turbo B</td><td>A</td><td>—</td></tr><tr><td>Start</td><td>Enter</td><td>Numpad 1</td></tr><tr><td>Select</td><td>Right Ctrl</td><td>Numpad 3</td></tr></tbody></table>
            </div>
            <div class="selector">
                <h3>Available games:</h3>
                <input type="radio" id="mario.nes" name="game" value="Mario">
                <label for="mario.nes">Mario</label><br>
                <input type="radio" id="contra.nes" name="game" value="Contra">
                <label for="contra.nes">Contra</label><br>
                <input type="radio" id="chipndale.nes" name="game" value="Chip n` dale">
                <label for="chipndale.nes">Chip n` dale</label><br>
                <input type="radio" id="kirby.nes" name="game" value="Kirby">
                <label for="kirby.nes">Kirby</label><br>
                <input type="radio" id="fireboy.swf" name="game" value="Fireboy and Watergirl">
                <label for="fireboy.swf">Fireboy and Watergirl</label><br>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
            var radios = document.querySelectorAll('input[name="game"]');

            radios.forEach(function(radio) {
                radio.addEventListener('change', function() {
                    if (this.checked) {
                        var selectedId = this.id; // например "fireboy.swf"
                        console.log('Выбрана radio кнопка с id:', selectedId);
                        var container = document.getElementById("nes");
                        if (selectedId.endsWith('.swf')) {
                            container.innerHTML = '';
                            container.innerHTML = '<embed height="480" src="assets/games/'+selectedId+'" type="application/x-shockwave-flash" width="620"></embed>';
                        } else {
                            container.innerHTML = '';
                            var browser = new jsnes.Browser({
                                container: document.getElementById("nes"),
                                onError: function (e) {
                                console.error(e);
                                },
                            });
                            jsnes.Browser.loadROMFromURL("assets/games/"+selectedId, function (err, data) {
                                if (err) {
                                console.error(err);
                                return;
                                }
                                browser.loadROM(data);
                            });
                        };
                    }
                });
            });
        });
        </script>
    </div>
</body>
</html>
